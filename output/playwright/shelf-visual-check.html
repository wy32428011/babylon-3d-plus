<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shelf 多穿货架参数化视觉验证</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111417;
        color: #edf3f7;
        font-family: "Microsoft YaHei", Arial, sans-serif;
      }

      #renderCanvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      #status {
        position: fixed;
        left: 16px;
        top: 16px;
        max-width: 960px;
        padding: 12px 14px;
        border: 1px solid rgba(166, 190, 205, 0.38);
        background: rgba(11, 15, 19, 0.8);
        font-size: 13px;
        line-height: 1.55;
      }

      .ok {
        color: #88e6ae;
      }

      .error {
        color: #ff9b9b;
      }
    </style>
  </head>
  <body data-validation-status="loading">
    <canvas id="renderCanvas"></canvas>
    <div id="status">Shelf 多穿货架参数化视觉验证加载中...</div>
    <script type="module">
      import {
        ArcRotateCamera,
        Color3,
        Engine,
        HemisphericLight,
        MeshBuilder,
        Scene,
        SceneLoader,
        StandardMaterial,
        TransformNode,
        Vector3,
      } from "@babylonjs/core";
      import "@babylonjs/loaders/glTF/index.js";
      import { ExternalModelScriptRuntime } from "/src/runtime/babylon/ExternalModelScriptRuntime.ts";

      const canvas = document.querySelector("#renderCanvas");
      const status = document.querySelector("#status");
      const engine = new Engine(canvas, true, { preserveDrawingBuffer: true, stencil: true });
      const scene = new Scene(engine);
      scene.clearColor.set(0.067, 0.079, 0.091, 1);

      const camera = new ArcRotateCamera("camera", Math.PI * 0.2, Math.PI * 0.3, 48, new Vector3(0, 5.2, 0), scene);
      camera.attachControl(canvas, true);
      camera.lowerRadiusLimit = 8;
      camera.upperRadiusLimit = 80;

      const light = new HemisphericLight("light", new Vector3(0.25, 1, 0.35), scene);
      light.intensity = 0.92;

      const groundMaterial = new StandardMaterial("groundMaterial", scene);
      groundMaterial.diffuseColor = new Color3(0.13, 0.16, 0.17);
      groundMaterial.specularColor = Color3.Black();
      const ground = MeshBuilder.CreateGround("ground", { width: 60, height: 38 }, scene);
      ground.material = groundMaterial;
      ground.position.y = -0.02;

      const metadata = await fetch("./shelf-assets/meta.json").then((response) => response.json());
      const defaultValues = {
        layerCount: 1,
        columnCount: 1,
        cellWidth: 0.801,
        cellHeight: 4.525,
        supportLegHeight: 0.904,
        cellDepth: 1.183,
        postWidth: 0.08,
        doubleDeepEnabled: false,
        deepSlotGap: 0.2,
        deepSlotLift: 0,
      };

      const cases = [
        { id: "default", label: "默认", x: -14, z: -8, rotationY: 0, values: { ...defaultValues } },
        { id: "width", label: "宽度 1.25", x: -7, z: -8, rotationY: 0, values: { ...defaultValues, cellWidth: 1.25 } },
        { id: "depth", label: "深度 1.8", x: 0, z: -8, rotationY: 0, values: { ...defaultValues, cellDepth: 1.8 } },
        { id: "post", label: "立柱 0.16", x: 7, z: -8, rotationY: 0, values: { ...defaultValues, postWidth: 0.16 } },
        { id: "height", label: "货架高 6.8", x: 14, z: -8, rotationY: 0, values: { ...defaultValues, cellHeight: 6.8 } },
        { id: "columns", label: "4列", x: -14, z: 5, rotationY: 0, values: { ...defaultValues, columnCount: 4 } },
        { id: "layers", label: "3层", x: -7, z: 5, rotationY: 0, values: { ...defaultValues, layerCount: 3 } },
        { id: "doubleGap", label: "双深间隔 0.4", x: 0, z: 5, rotationY: 0, values: { ...defaultValues, doubleDeepEnabled: true, deepSlotGap: 0.4 } },
        { id: "deepLift", label: "双深提升 0.35", x: 7, z: 5, rotationY: 0, values: { ...defaultValues, doubleDeepEnabled: true, deepSlotLift: 0.35 } },
        { id: "rotation", label: "旋转组合", x: 14, z: 5, rotationY: Math.PI / 4, values: { ...defaultValues, layerCount: 2, columnCount: 3, cellWidth: 1.25, cellHeight: 5.2, supportLegHeight: 1.2, cellDepth: 1.6, doubleDeepEnabled: true, deepSlotGap: 0.3, deepSlotLift: 0.2 } },
      ];

      function syncModelScriptMetadata(target, values) {
        const scripts = (metadata.parameterScripts ?? []).map((script) => {
          const clonedScript = structuredClone(script);
          clonedScript.values = clonedScript.values ?? {};
          for (const [key, value] of Object.entries(values)) {
            const previousValue = typeof clonedScript.values[key] === "object" && clonedScript.values[key] !== null
              ? clonedScript.values[key]
              : {};
            clonedScript.values[key] = { ...previousValue, value };
          }
          return clonedScript;
        });
        target.metadata = { ...(target.metadata ?? {}), scripts };
      }

      function parentTopLevelModelNodes(container, contentRoot) {
        const allImportedNodes = new Set([...container.meshes, ...container.transformNodes]);
        for (const node of allImportedNodes) {
          if (!node.parent || !allImportedNodes.has(node.parent)) {
            node.parent = contentRoot;
          }
        }
      }

      function normalizeModelContentOrigin(root) {
        root.computeWorldMatrix(true);
        const childMeshes = root.getChildMeshes(false);
        if (childMeshes.length === 0) return;

        let minimum = new Vector3(Number.POSITIVE_INFINITY, Number.POSITIVE_INFINITY, Number.POSITIVE_INFINITY);
        let maximum = new Vector3(Number.NEGATIVE_INFINITY, Number.NEGATIVE_INFINITY, Number.NEGATIVE_INFINITY);
        for (const mesh of childMeshes) {
          mesh.computeWorldMatrix(true);
          const box = mesh.getBoundingInfo().boundingBox;
          minimum = Vector3.Minimize(minimum, box.minimumWorld);
          maximum = Vector3.Maximize(maximum, box.maximumWorld);
        }

        const bottomCenter = new Vector3((minimum.x + maximum.x) / 2, minimum.y, (minimum.z + maximum.z) / 2);
        const localBottomCenter = Vector3.TransformCoordinates(bottomCenter, root.getWorldMatrix().clone().invert());
        for (const child of root.getChildren()) {
          if (child instanceof TransformNode) {
            child.position.subtractInPlace(localBottomCenter);
          }
        }
      }

      function getRootBounds(root) {
        const meshes = root.getChildMeshes(false).filter((mesh) => mesh.isEnabled());
        let minimum = new Vector3(Number.POSITIVE_INFINITY, Number.POSITIVE_INFINITY, Number.POSITIVE_INFINITY);
        let maximum = new Vector3(Number.NEGATIVE_INFINITY, Number.NEGATIVE_INFINITY, Number.NEGATIVE_INFINITY);
        for (const mesh of meshes) {
          mesh.computeWorldMatrix(true);
          mesh.refreshBoundingInfo();
          const box = mesh.getBoundingInfo().boundingBox;
          minimum = Vector3.Minimize(minimum, box.minimumWorld);
          maximum = Vector3.Maximize(maximum, box.maximumWorld);
        }
        const size = maximum.subtract(minimum);
        return {
          meshCount: meshes.length,
          generatedCount: scene.transformNodes.filter((node) => node.isDescendantOf?.(root) && node.metadata?.generatedByParametricRuntime).length,
          size: {
            x: Number(size.x.toFixed(3)),
            y: Number(size.y.toFixed(3)),
            z: Number(size.z.toFixed(3)),
          },
        };
      }

      async function createShelfCase(testCase) {
        const root = new TransformNode(`${testCase.label}_root`, scene);
        root.position.x = testCase.x;
        root.position.z = testCase.z ?? 0;
        root.rotation.y = testCase.rotationY ?? 0;
        const contentRoot = new TransformNode(`${testCase.label}_contentRoot`, scene);
        contentRoot.parent = root;
        contentRoot.scaling = new Vector3(0.001, 0.001, 0.001);

        const container = await SceneLoader.LoadAssetContainerAsync("./shelf-assets/", "Shelf.glb", scene);
        container.addAllToScene();
        parentTopLevelModelNodes(container, contentRoot);
        normalizeModelContentOrigin(root);
        syncModelScriptMetadata(contentRoot, testCase.values);

        const modelAsset = {
          sourcePath: "./shelf-assets/Shelf.glb",
          sourceUrl: "./shelf-assets/Shelf.glb",
          lengthUnit: "millimeter",
          unitScaleToMeters: 0.001,
          scriptAssets: [
            {
              path: "./shelf-assets/shelf.model.ts",
              sourceUrl: "./shelf-assets/shelf.model.txt",
              name: "shelf.model.ts",
            },
          ],
          parameterScriptMetadata: metadata.parameterScripts ?? [],
          animationScriptMetadata: metadata.animationScripts ?? [],
          parameterValues: testCase.values,
        };

        const runtime = new ExternalModelScriptRuntime(contentRoot, modelAsset);
        runtime.updateParameterValues(testCase.values);
        await runtime.start();
        runtime.update();
        return { id: testCase.id, label: testCase.label, ...getRootBounds(root) };
      }

      try {
        const reports = [];
        for (const testCase of cases) reports.push(await createShelfCase(testCase));
        const byId = Object.fromEntries(reports.map((item) => [item.id, item]));
        const failures = reports.filter((item) => item.meshCount <= 0 || item.size.x <= 0 || item.size.y <= 0 || item.size.z <= 0).map((item) => `${item.label}: 空模型`);
        const near = (value, expected, tolerance = 0.05) => Math.abs(value - expected) <= tolerance;
        if (!near(byId.default.size.x, 0.801) || !near(byId.default.size.y, 4.525) || !near(byId.default.size.z, 1.183)) failures.push("默认尺寸异常");
        if (byId.width.size.x <= byId.default.size.x + 0.35) failures.push("宽度参数未明显生效");
        if (byId.depth.size.z <= byId.default.size.z + 0.5) failures.push("深度参数未明显生效");
        if (!near(byId.post.size.y, byId.default.size.y) || !near(byId.post.size.z, byId.default.size.z, 0.12)) failures.push("立柱宽度污染整体高度或深度");
        if (!near(byId.height.size.y, 6.8)) failures.push("货架高度参数异常");
        if (byId.columns.size.x <= 2.4) failures.push("列数参数未生成连续多列");
        if (!near(byId.layers.size.y, 11.767, 0.06)) failures.push("层数高度未按独立底腿语义计算");
        if (byId.doubleGap.size.z <= 2.6) failures.push("双深间隔参数未生效");
        if (byId.deepLift.size.y <= byId.default.size.y + 0.25) failures.push("深位提升参数未生效");
        const summary = reports.map((item) => `${item.label}: node=${item.generatedCount}, mesh=${item.meshCount}, size=${item.size.x}/${item.size.y}/${item.size.z}`).join("<br />");
        status.innerHTML = `<span class="${failures.length ? "error" : "ok"}">${failures.length ? "失败" : "通过"}</span><br />${summary}${failures.length ? `<br />${failures.join("<br />")}` : ""}`;
        document.body.dataset.validationStatus = failures.length ? "fail" : "pass";
        engine.runRenderLoop(() => scene.render());
        window.__SHELF_REPORT__ = reports;
        window.__SHELF_VISUAL_READY__ = failures.length === 0;
      } catch (error) {
        console.error(error);
        status.innerHTML = `<span class="error">失败</span>：${error instanceof Error ? error.message : String(error)}`;
        document.body.dataset.validationStatus = "fail";
        window.__SHELF_VISUAL_READY__ = false;
      }

      window.addEventListener("resize", () => engine.resize());
    </script>
  </body>
</html>
