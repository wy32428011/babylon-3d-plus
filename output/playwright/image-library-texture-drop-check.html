<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>图片库方向箭头拖入 texture 属性验证</title>
    <style>
      :root { color-scheme: dark; font-family: "Microsoft YaHei", Arial, sans-serif; }
      * { box-sizing: border-box; }
      html, body { margin: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 10%, #183347 0, #081118 48%, #04090d 100%); color: #eaf8ff; }
      body { display: grid; place-items: center; }
      main { width: min(980px, calc(100% - 48px)); display: grid; grid-template-columns: 1fr 1.25fr; gap: 24px; }
      section { min-height: 360px; padding: 20px; border: 1px solid rgba(81, 201, 244, 0.35); background: rgba(7, 18, 26, 0.88); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35); }
      h1, h2 { margin: 0; font-weight: 600; }
      h1 { grid-column: 1 / -1; font-size: 20px; color: #dcf8ff; }
      h2 { margin-bottom: 16px; font-size: 15px; color: #8ee8ff; }
      .image-card { width: 190px; padding: 10px; border: 1px solid #27617a; background: #0d202b; cursor: grab; user-select: none; }
      .image-card:active { cursor: grabbing; }
      .checker { height: 170px; display: grid; place-items: center; overflow: hidden; background-color: #14242d; background-image: linear-gradient(45deg, rgba(255,255,255,.08) 25%, transparent 25% 75%, rgba(255,255,255,.08) 75%), linear-gradient(45deg, rgba(255,255,255,.08) 25%, transparent 25% 75%, rgba(255,255,255,.08) 75%); background-position: 0 0, 10px 10px; background-size: 20px 20px; }
      .checker img { width: 150px; height: 150px; object-fit: contain; filter: drop-shadow(0 0 10px rgba(29, 214, 255, .5)); }
      .card-title { margin-top: 10px; text-align: center; font-size: 14px; }
      .card-subtitle { margin-top: 4px; text-align: center; color: #7fa4b5; font-size: 12px; }
      .texture-row { display: grid; grid-template-columns: 104px 1fr; gap: 12px; align-items: center; }
      .drop-zone { min-height: 126px; display: grid; grid-template-columns: 96px 1fr; gap: 14px; align-items: center; padding: 12px; border: 1px dashed #4a9fc2; background: rgba(20, 46, 59, .56); transition: border-color .15s, background .15s, box-shadow .15s; }
      .drop-zone.drag-over { border-color: #54e6ff; background: rgba(20, 83, 103, .48); box-shadow: inset 0 0 22px rgba(50, 215, 255, .13); }
      .preview { width: 90px; height: 90px; display: grid; place-items: center; overflow: hidden; border: 1px solid #315d70; background: #09141b; }
      .preview img { width: 100%; height: 100%; object-fit: contain; }
      .placeholder { color: #668797; font-size: 11px; }
      .reference { min-width: 0; padding: 9px 10px; border: 1px solid #385b69; background: #071117; color: #d9f5ff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .hint { margin-top: 9px; color: #85a6b5; font-size: 12px; line-height: 1.55; }
      #status { grid-column: 1 / -1; padding: 11px 13px; border-left: 3px solid #d4a93b; background: rgba(8, 18, 24, .92); font-size: 13px; }
      #status.pass { border-left-color: #52e096; color: #91efb8; }
      #status.fail { border-left-color: #ff7777; color: #ff9b9b; }
    </style>
  </head>
  <body data-validation-status="loading">
    <main>
      <h1>内置方向箭头：图片库拖入模型 texture 属性</h1>
      <section>
        <h2>图片库</h2>
        <article id="image-card" class="image-card" draggable="true" aria-label="方向箭头发光贴图">
          <div class="checker"><img id="library-image" alt="透明发光右向箭头" /></div>
          <div id="image-name" class="card-title"></div>
          <div class="card-subtitle">内置图片 · 可拖拽</div>
        </article>
      </section>
      <section>
        <h2>模型属性</h2>
        <div class="texture-row">
          <label for="texture-drop">方向箭头贴图</label>
          <div id="texture-drop" class="drop-zone" role="button" tabindex="0" aria-label="方向箭头贴图拖放区">
            <div class="preview"><span id="preview-placeholder" class="placeholder">Texture</span><img id="texture-preview" alt="已拖入方向箭头" hidden /></div>
            <div>
              <div id="texture-reference" class="reference">尚未设置</div>
              <div class="hint">从左侧图片库拖入。属性保存稳定逻辑引用，开发与生产构建再解析为真实 PNG URL。</div>
            </div>
          </div>
        </div>
      </section>
      <div id="status">等待把“方向箭头发光贴图”拖入“方向箭头贴图”属性...</div>
    </main>
    <script type="module">
      import { BUILT_IN_IMAGE_ASSETS, DIRECTION_ARROW_GLOW_IMAGE_REFERENCE } from "/src/assets/imageAssets.ts";
      import { decodeImageAssetDragPayload, encodeImageAssetDragPayload, IMAGE_ASSET_DRAG_MIME_TYPE } from "/src/editor/assets/AssetDatabase.ts";
      import { isAllowedTextureReference } from "/src/editor/model/textureReferences.ts";

      const asset = BUILT_IN_IMAGE_ASSETS.find((item) => item.reference === DIRECTION_ARROW_GLOW_IMAGE_REFERENCE);
      if (!asset) throw new Error("未找到内置方向箭头图片资产");

      const card = document.querySelector("#image-card");
      const dropZone = document.querySelector("#texture-drop");
      const libraryImage = document.querySelector("#library-image");
      const imageName = document.querySelector("#image-name");
      const preview = document.querySelector("#texture-preview");
      const placeholder = document.querySelector("#preview-placeholder");
      const reference = document.querySelector("#texture-reference");
      const status = document.querySelector("#status");

      libraryImage.src = asset.sourceUrl;
      imageName.textContent = asset.name;

      /** 检查 PNG 透明角与中心非透明像素，避免把蓝色底误当成透明背景。 */
      async function inspectTransparency() {
        await libraryImage.decode();
        const canvas = document.createElement("canvas");
        canvas.width = libraryImage.naturalWidth;
        canvas.height = libraryImage.naturalHeight;
        const context = canvas.getContext("2d", { willReadFrequently: true });
        context.drawImage(libraryImage, 0, 0);
        const cornerAlpha = context.getImageData(0, 0, 1, 1).data[3];
        const centerAlpha = context.getImageData(Math.floor(canvas.width / 2), Math.floor(canvas.height / 2), 1, 1).data[3];
        return { width: canvas.width, height: canvas.height, cornerAlpha, centerAlpha };
      }

      /** 写入与真实 ProjectPanel 相同的专用图片 MIME。 */
      card.addEventListener("dragstart", (event) => {
        event.dataTransfer.effectAllowed = "copy";
        event.dataTransfer.setData(IMAGE_ASSET_DRAG_MIME_TYPE, encodeImageAssetDragPayload(asset));
        event.dataTransfer.setData("text/plain", asset.name);
      });

      dropZone.addEventListener("dragover", (event) => {
        if (!event.dataTransfer.types.includes(IMAGE_ASSET_DRAG_MIME_TYPE)) return;
        event.preventDefault();
        event.dataTransfer.dropEffect = "copy";
        dropZone.classList.add("drag-over");
      });
      dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));

      /** 解码并校验注册表载荷，随后把逻辑引用写入 texture 属性。 */
      dropZone.addEventListener("drop", async (event) => {
        event.preventDefault();
        dropZone.classList.remove("drag-over");
        const payload = decodeImageAssetDragPayload(event.dataTransfer.getData(IMAGE_ASSET_DRAG_MIME_TYPE));
        const transparency = await inspectTransparency();
        const failures = [];
        if (!payload) failures.push("拖拽载荷解码失败");
        if (payload && !isAllowedTextureReference(payload.reference)) failures.push("逻辑引用未通过 texture 白名单");
        if (payload?.reference !== DIRECTION_ARROW_GLOW_IMAGE_REFERENCE) failures.push("逻辑引用不一致");
        if (transparency.width !== 512 || transparency.height !== 512) failures.push("PNG 尺寸不是 512x512");
        if (transparency.cornerAlpha !== 0 || transparency.centerAlpha === 0) failures.push("PNG 透明度不符合要求");

        if (payload) {
          preview.src = payload.sourceUrl;
          preview.hidden = false;
          placeholder.hidden = true;
          reference.textContent = payload.reference;
        }
        const report = { payload, transparency, failures, mimeType: IMAGE_ASSET_DRAG_MIME_TYPE };
        window.__IMAGE_TEXTURE_DROP_REPORT__ = report;
        window.__IMAGE_TEXTURE_DROP_READY__ = failures.length === 0;
        document.body.dataset.validationStatus = failures.length ? "fail" : "pass";
        status.className = failures.length ? "fail" : "pass";
        status.textContent = failures.length ? "失败：" + failures.join("；") : "通过：图片库透明发光箭头已通过专用 MIME 拖入 texture 属性。";
      });

      window.__IMAGE_TEXTURE_DROP_READY__ = false;
      window.__IMAGE_TEXTURE_DROP_ASSET__ = asset;
    </script>
  </body>
</html>
