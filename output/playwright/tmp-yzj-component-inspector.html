<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"><link rel="icon" href="data:,"><style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0b1014;color:#fff;font-family:Consolas,monospace}canvas{width:100%;height:100%;display:block}#info{position:fixed;left:12px;top:12px;width:370px;max-height:245px;overflow:auto;padding:10px;background:#071018dd;border:1px solid #789;font-size:13px;white-space:pre-wrap}
</style></head><body><canvas id="c"></canvas><div id="info">loading</div><script type="module">
import {ArcRotateCamera,Color3,DynamicTexture,Engine,HemisphericLight,Matrix,Mesh,MeshBuilder,Scene,SceneLoader,StandardMaterial,Vector3,VertexData} from '@babylonjs/core';
import '@babylonjs/loaders/glTF/index.js';
const q=new URLSearchParams(location.search);const meshName=q.get('mesh')??'ZT.2';const selected=new Set((q.get('ids')??'').split(',').filter(Boolean).map(Number));const showLabels=q.get('labels')!=='0';
const canvas=document.querySelector('#c'), info=document.querySelector('#info');const engine=new Engine(canvas,true,{preserveDrawingBuffer:true,stencil:true});const scene=new Scene(engine);scene.clearColor.set(.035,.05,.06,1);
const cam=new ArcRotateCamera('cam',Math.PI*.22,Math.PI*.29,4.2,new Vector3(-.7,.45,0),scene);cam.attachControl(canvas,true);cam.wheelPrecision=35;
new HemisphericLight('h',new Vector3(.3,1,.2),scene).intensity=1.2;
const ground=MeshBuilder.CreateGround('g',{width:5,height:4},scene);const gm=new StandardMaterial('gm',scene);gm.diffuseColor=new Color3(.08,.1,.11);gm.specularColor=Color3.Black();ground.material=gm;ground.position.y=-.01;
const c=await SceneLoader.LoadAssetContainerAsync('./yzj-assets/','YZJ.glb',scene);c.addAllToScene();const imported=new Set([...c.meshes,...c.transformNodes]);for(const n of imported){if(!n.parent||!imported.has(n.parent))n.scaling.scaleInPlace(.01);}
const node=[...scene.transformNodes,...scene.meshes].find(n=>n.name===meshName);const src=node?.getChildMeshes?.(false)?.[0]??node;if(!src)throw new Error('not found '+meshName);
src.computeWorldMatrix(true);const positions=Array.from(src.getVerticesData('position')??[]);const normals=Array.from(src.getVerticesData('normal')??[]);const indices=Array.from(src.getIndices()??[]);
const key=i=>`${positions[i*3].toFixed(5)},${positions[i*3+1].toFixed(5)},${positions[i*3+2].toFixed(5)}`;const parent=new Map();const find=x=>{if(!parent.has(x))parent.set(x,x);let y=x;while(parent.get(y)!==y)y=parent.get(y);let z=x;while(parent.get(z)!==z){const n=parent.get(z);parent.set(z,y);z=n}return y};const union=(a,b)=>{a=find(a);b=find(b);if(a!==b)parent.set(b,a)};
const tris=[];for(let i=0;i<indices.length;i+=3){const tri=[indices[i],indices[i+1],indices[i+2]];const ks=tri.map(key);union(ks[0],ks[1]);union(ks[1],ks[2]);tris.push({tri,root:ks[0]})}
const groups=new Map();for(const t of tris){const r=find(t.root);if(!groups.has(r))groups.set(r,[]);groups.get(r).push(t.tri)}
const comps=[...groups.values()].map(triangles=>{const pts=[];for(const tri of triangles)for(const vi of tri)pts.push([positions[vi*3],positions[vi*3+1],positions[vi*3+2]]);const min=[0,1,2].map(k=>Math.min(...pts.map(p=>p[k]))),max=[0,1,2].map(k=>Math.max(...pts.map(p=>p[k])));return{triangles,min,max,faces:triangles.length}}).sort((a,b)=>b.faces-a.faces);
const world=src.getWorldMatrix().clone();src.setEnabled(false);const focusPoints=[];const colors=[new Color3(.15,.7,1),new Color3(1,.3,.2),new Color3(.2,1,.5),new Color3(1,.75,.15),new Color3(.8,.3,1),new Color3(.2,.85,.85)];
for(let ci=0;ci<comps.length;ci++){const comp=comps[ci];const p=[],n=[],ix=[];for(const tri of comp.triangles){for(const vi of tri){p.push(positions[vi*3],positions[vi*3+1],positions[vi*3+2]);n.push(normals[vi*3]??0,normals[vi*3+1]??1,normals[vi*3+2]??0);ix.push(ix.length)}}const m=new Mesh(`${meshName}-component-${ci}`,scene);const vd=new VertexData();vd.positions=p;vd.normals=n;vd.indices=ix;vd.applyToMesh(m,true);m.parent=src.parent;m.position.copyFrom(src.position);m.scaling.copyFrom(src.scaling);if(src.rotationQuaternion)m.rotationQuaternion=src.rotationQuaternion.clone();else m.rotation.copyFrom(src.rotation);const mat=new StandardMaterial(`mat-${ci}`,scene);const active=selected.size===0||selected.has(ci);mat.diffuseColor=selected.size===0?colors[ci%colors.length]:(active?new Color3(1,.08,.05):new Color3(.18,.2,.22));mat.emissiveColor=selected.has(ci)?new Color3(.45,.01,0):Color3.Black();mat.alpha=selected.size && !active ? .16 : 1;m.material=mat;m.isPickable=false;
 if(showLabels&&(selected.size===0?ci<20:selected.has(ci))){const center=new Vector3((comp.min[0]+comp.max[0])/2,(comp.min[1]+comp.max[1])/2,(comp.min[2]+comp.max[2])/2);const wp=Vector3.TransformCoordinates(center,world);if(selected.has(ci))focusPoints.push(wp);const plane=MeshBuilder.CreatePlane(`label-${ci}`,{width:.22,height:.09},scene);plane.position=wp.add(new Vector3(0,.08,0));plane.billboardMode=Mesh.BILLBOARDMODE_ALL;const dt=new DynamicTexture(`dt-${ci}`,{width:256,height:96},scene,true);dt.hasAlpha=true;dt.drawText(String(ci),null,70,'bold 60px Arial','white','rgba(0,0,0,.72)',true);const lm=new StandardMaterial(`lm-${ci}`,scene);lm.diffuseTexture=dt;lm.emissiveColor=Color3.White();lm.backFaceCulling=false;plane.material=lm;}
}
if(focusPoints.length){const min=Vector3.Minimize(...focusPoints),max=Vector3.Maximize(...focusPoints);cam.setTarget(min.add(max).scale(.5));cam.radius=Math.max(1.25,Vector3.Distance(min,max)*4.5);}const listed=selected.size?[...selected].map(i=>[i,comps[i]]):comps.map((c,i)=>[i,c]);info.textContent=`mesh=${meshName} components=${comps.length} selected=${[...selected].join(',')||'all'}\n`+listed.map(([i,c])=>`${i}: faces=${c.faces} center=${c.min.map((v,k)=>((v+c.max[k])/2).toFixed(3)).join(',')} size=${c.min.map((v,k)=>(c.max[k]-v).toFixed(3)).join(',')}`).join('\n');document.body.dataset.ready='true';
engine.runRenderLoop(()=>scene.render());addEventListener('resize',()=>engine.resize());
</script></body></html>
